# docker.yml — Triggers on push to main (tags: latest + short SHA) and on v* tags (tags: latest + semver).
# Builds the oximy-gateway Docker image and pushes to GHCR (ghcr.io/oximyhq/gateway).

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oximyhq/gateway

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed for OIDC-based signing (cosign) if added later
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On v* tag: tag with the full semver and as "latest"
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On main push: tag as "edge" + short SHA for traceability
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
            # Always tag latest on main (overridden by semver on release tags)
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          # Layer caching via GitHub Actions cache (no extra registry required)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args — no secrets baked in; keys are passed at runtime via env
          build-args: |
            BUILDKIT_INLINE_CACHE=1
