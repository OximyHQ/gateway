# cargo-deny configuration — license + advisory gating for the supply chain.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses compatible with shipping an Apache-2.0 binary.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
# Our internal crates are referenced by versionless `{ path = ... }` deps, which
# cargo-deny flags as wildcards. All EXTERNAL deps are version-pinned, so the
# wildcard ban only fires on our own workspace crates — allow it.
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
