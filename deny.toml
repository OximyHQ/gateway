# cargo-deny configuration — license + advisory gating for the supply chain.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses compatible with shipping an Apache-2.0 binary.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
