:root{
  /* Oximy warm-cream design language */
  --bg:#FFFAF8; --bg1:#FFF5F1; --bg2:#FFEFEA; --card:#FFFFFF; --card2:#FFF8F4;
  --line:#e5e5e5; --line2:#d4d4d4; --line3:#d4d4d4;
  --tx:#1a1a1a; --dim:#525252; --faint:#737373; --ghost:#a3a3a3;
  --acc:#FF4D00; --acc2:#E64500; --acc-dark:#3C1800; --acc-bg:rgba(255,77,0,.1); --acc-ln:rgba(255,77,0,.26); --acc-soft:#FBF4EB;
  --ok:#22c55e; --ok-bg:#f0fdf4; --warn:#f59e0b; --warn-bg:#fffbeb;
  --err:#ef4444; --err-bg:#fef2f2; --info:#3b82f6; --info-bg:#eff6ff;
  --violet:#a87c9f; --violet-bg:rgba(168,124,159,.12);
  --viz-1:#FF4D00; --viz-2:#5778a4; --viz-3:#a87c9f; --viz-4:#85b6b2; --viz-5:#e7ca60; --viz-6:#6a9f58; --viz-7:#967662;
  --sh-sm:0 1px 2px 0 rgb(0 0 0/.05); --sh:0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1);
  --sh-md:0 10px 15px -3px rgb(0 0 0/.1),0 4px 6px -4px rgb(0 0 0/.1);
  --ring:0 0 0 2px #FF4D00,0 0 0 4px rgba(255,77,0,.15);
  --mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  --display:'PPMondwest','Delight',system-ui,sans-serif;
  --sans:'Delight','Hanken Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1); --r:6px; --r2:8px; --sb:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--tx); font-family:var(--sans);
  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(820px 480px at 88% -10%, rgba(255,77,0,.06), transparent 58%),
    radial-gradient(620px 460px at -6% 112%, rgba(255,77,0,.035), transparent 55%);
  background-attachment:fixed;
}
::selection{background:var(--acc);color:#fff}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#e2d6cd;border-radius:11px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#d4c4b8}
a{color:inherit;text-decoration:none}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)} .faint{color:var(--faint)}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

#app{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh}
#side{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);
  background:linear-gradient(180deg,#FFFDFB,#FFF6F1);display:flex;flex-direction:column;z-index:5}
.brand{display:flex;align-items:center;gap:11px;padding:21px 20px 18px}
.logo{width:31px;height:31px;border-radius:9px;position:relative;flex:0 0 auto;
  background:linear-gradient(140deg,#FF6A2B,#FF4D00);box-shadow:0 0 0 1px rgba(255,77,0,.25),0 7px 16px -7px rgba(255,77,0,.7)}
.logo::before{content:"";position:absolute;inset:0;border-radius:9px;background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.55),transparent 48%)}
.logo i{position:absolute;inset:0;display:grid;place-items:center;font-style:normal;font-family:var(--mono);font-size:16px;color:#fff}
.pulse{position:absolute;right:-3px;top:-3px;width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 2px #fff;animation:pl 2.6s infinite}
@keyframes pl{0%{box-shadow:0 0 0 2px #fff,0 0 0 2px rgba(22,163,74,.4)}70%{box-shadow:0 0 0 2px #fff,0 0 0 8px rgba(22,163,74,0)}100%{box-shadow:0 0 0 2px #fff,0 0 0 8px rgba(22,163,74,0)}}
.brand b{font-weight:600;font-size:16px;letter-spacing:-.01em;line-height:1.05}
.brand small{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--acc);text-transform:uppercase;margin-top:1px}
nav{padding:8px 12px;flex:1;overflow-y:auto}
.navlbl{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--ghost);text-transform:uppercase;padding:15px 10px 7px}
.nav{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:8px;color:var(--dim);
  font-size:13.5px;font-weight:500;cursor:pointer;position:relative;transition:.14s var(--ease);user-select:none}
.nav:hover{background:var(--bg2);color:var(--tx)}
.nav.on{background:var(--acc-bg);color:var(--acc)}
.nav.on::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--acc)}
.nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;flex:0 0 auto}
.nav .ct{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint);background:var(--bg2);padding:0 7px;border-radius:20px;min-width:20px;text-align:center}
.nav.on .ct{color:var(--acc);background:var(--acc-bg)}
.sidefoot{padding:14px 18px;border-top:1px solid var(--line);font-family:var(--mono);font-size:12px;color:var(--faint);display:flex;justify-content:space-between;align-items:center}

#main{min-width:0;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:4;display:flex;align-items:center;gap:14px;
  padding:0 26px;height:62px;border-bottom:1px solid var(--line);background:rgba(255,250,248,.82);backdrop-filter:blur(14px)}
header h1{font-size:17px;font-weight:600;letter-spacing:-.01em}
header h1 .sub{color:var(--faint);font-weight:400;font-size:13px;margin-left:9px}
.hspace{flex:1}
.hstat{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);padding:6px 12px;border:1px solid var(--line2);border-radius:20px;background:var(--card);box-shadow:var(--sh-sm)}
.hstat .num{font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ghost);flex:0 0 auto}
.dot.ok{background:var(--ok)} .dot.bad{background:var(--err)}
.hkey{cursor:pointer;transition:.14s} .hkey:hover{border-color:var(--acc-ln);color:var(--acc)}
.content{padding:26px 28px;max-width:1340px;width:100%}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.row{display:flex;align-items:center;gap:12px}
.pagehd{display:flex;align-items:flex-end;gap:14px;margin-bottom:22px}
.pagehd h2{font-size:23px;font-weight:600;letter-spacing:-.02em}
.pagehd p{color:var(--dim);font-size:13px;margin-bottom:3px}

.grid{display:grid;gap:14px}
.g6{grid-template-columns:repeat(6,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:1.6fr 1fr}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden;box-shadow:var(--sh);animation:rise .5s both var(--ease)}
.card.glow{background:linear-gradient(140deg,#fff,#FFF8F3)}
.card.glow::after{content:"";position:absolute;top:-50%;right:-15%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,0,.07),transparent 70%);pointer-events:none}
.stat .k{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:7px}
.stat{padding:16px}
.stat .v{font-size:clamp(15px,1.5vw,23px);font-weight:600;letter-spacing:-.02em;margin-top:11px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.stat .ic{width:15px;height:15px;stroke:var(--acc);fill:none;stroke-width:1.8}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;padding:2px 9px;border-radius:20px;border:1px solid var(--line2);color:var(--dim);background:var(--bg1);white-space:nowrap}
.chip.ok{color:var(--ok);border-color:rgba(22,163,74,.25);background:var(--ok-bg)}
.chip.warn{color:var(--warn);border-color:rgba(217,119,6,.25);background:var(--warn-bg)}
.chip.bad{color:var(--err);border-color:rgba(220,38,38,.25);background:var(--err-bg)}
.chip.v{color:var(--violet);border-color:rgba(157,111,147,.28);background:var(--violet-bg)}
h3.sec{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:10px}
h3.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);
  font-weight:400;padding:11px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg1);white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:hover td{background:#FFF8F3}
.tbl tr:last-child td{border-bottom:0}
.tblwrap{border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;background:var(--card);box-shadow:var(--sh)}
.tblscroll{max-height:60vh;overflow:auto}
.prog{height:6px;border-radius:6px;background:var(--bg2);overflow:hidden;min-width:64px}
.prog i{display:block;height:100%;background:linear-gradient(90deg,#FF6A2B,var(--acc))}
.prog.hi i{background:linear-gradient(90deg,var(--err),#f87171)}
.bars{display:flex;flex-direction:column;gap:10px}
.bar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;font-size:13px}
.bar .t{display:flex;align-items:center;gap:9px;min-width:0}
.bar .t span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .track{grid-column:1/-1;height:6px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar .track i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#FF6A2B,var(--acc));animation:grow .8s var(--ease) both}
@keyframes grow{from{width:0}}

input,select,textarea{font-family:var(--sans);font-size:13px;color:var(--tx);background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:9px 12px;width:100%;outline:none;transition:.14s}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
input::placeholder,textarea::placeholder{color:var(--ghost)}
textarea{resize:vertical;min-height:90px;font-family:var(--sans);font-size:13px;line-height:1.6}
label{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:6px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
  padding:9px 16px;border-radius:8px;border:1px solid var(--line2);background:var(--card);color:var(--tx);transition:.14s var(--ease);white-space:nowrap;box-shadow:var(--sh-sm)}
.btn:hover{border-color:var(--line3);background:var(--bg1)}
.btn.pri{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 6px 16px -7px rgba(255,77,0,.7)}
.btn.pri:hover{background:var(--acc2)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{color:var(--err);border-color:rgba(220,38,38,.25)} .btn.danger:hover{background:var(--err-bg)}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.field{margin-bottom:14px}
.searchbox{position:relative;max-width:340px}
.searchbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:1.8}
.searchbox input{padding-left:34px}

.scrim{position:fixed;inset:0;background:rgba(60,24,0,.28);backdrop-filter:blur(5px);z-index:50;display:none;align-items:center;justify-content:center;padding:24px}
.scrim.on{display:flex}
.modal{width:100%;max-width:440px;background:var(--card);border:1px solid var(--line2);border-radius:18px;padding:26px;box-shadow:var(--sh-md);animation:rise .3s both var(--ease)}
.modal h3{font-size:18px;font-weight:600;margin-bottom:5px}
.modal .mdsc{color:var(--dim);font-size:13px;margin-bottom:20px}
.modal .acts{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.gate .logo{width:48px;height:48px;margin:0 auto 18px}.gate .logo i{font-size:24px}
.secretbox{font-family:var(--mono);font-size:14px;background:var(--acc-soft);border:1px solid var(--acc-ln);color:var(--acc-dark);
  padding:13px;border-radius:10px;word-break:break-all;margin:8px 0;display:flex;gap:10px;align-items:center}
.secretbox button{margin-left:auto;flex:0 0 auto}
#toast{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:9px}
.tst{background:var(--card);border:1px solid var(--line2);border-left:3px solid var(--ok);border-radius:10px;padding:11px 15px;font-size:13px;box-shadow:var(--sh-md);animation:rise .25s both var(--ease);max-width:340px}
.tst.err{border-left-color:var(--err)} .tst.warn{border-left-color:var(--acc)}
.empty{text-align:center;padding:50px 20px;color:var(--faint)}
.empty svg{width:34px;height:34px;stroke:var(--ghost);fill:none;stroke-width:1.4;margin-bottom:12px}
.spark{width:100%;height:48px;display:block;margin-top:14px}
.skeleton{background:linear-gradient(90deg,var(--bg1),var(--bg2),var(--bg1));background-size:200% 100%;animation:sk 1.3s infinite;border-radius:8px;color:transparent}
@keyframes sk{to{background-position:-200% 0}}
.cap{display:inline-flex;gap:4px}.cap b{font-family:var(--mono);font-size:11px;font-weight:400;padding:0 6px;border-radius:5px;background:var(--bg2);color:var(--faint);border:1px solid var(--line)}
.cap b.on{color:var(--ok);border-color:rgba(22,163,74,.25);background:var(--ok-bg)}
@media(max-width:1000px){#app{grid-template-columns:1fr}#side{display:none}.g6,.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div class="brand">
      <div class="logo"><i>O</i><span class="pulse"></span></div>
      <div><b>Oximy</b><small>Gateway</small></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidefoot"><span id="ver">v—</span><span id="footstat" class="row" style="gap:6px"><span class="dot" id="footdot"></span>checking</span></div>
  </aside>
  <div id="main">
    <header>
      <h1 id="title">Overview <span class="sub" id="subtitle"></span></h1>
      <div class="hspace"></div>
      <div class="hstat" id="reqstat"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg><span id="reqnum" class="num">—</span> req</div>
      <div class="hstat hkey" id="keychip" title="API key"><span class="dot" id="keydot"></span><span id="keylabel">no key</span></div>
      <div class="hstat" id="health"><span class="dot" id="hdot"></span><span id="hlabel">…</span></div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)];
const API=location.origin;
let KEY=localStorage.getItem('oxgw_key')||'';
const fmt={
  usd:n=>{if(n==null)return '—';if(Math.abs(n)<5e-7)return '$0.00';return '$'+(n<0.01&&n>0?n.toFixed(6):n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:n<1?4:2}));},
  n:n=>n==null?'—':n.toLocaleString(),
  ms:n=>n==null?'—':n<1000?n+'ms':(n/1000).toFixed(2)+'s',
  ago:t=>{const s=(Date.now()-t)/1000;if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';},
  esc:s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),
};
function toast(msg,kind=''){const t=document.createElement('div');t.className='tst '+kind;t.textContent=msg;$('#toast').append(t);setTimeout(()=>{t.style.opacity=0;t.style.transform='translateX(20px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300)},3200);}
async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  if(r.status===401){throw {status:401,msg:'unauthorized'};}
  const ct=r.headers.get('content-type')||'';const body=ct.includes('json')?await r.json().catch(()=>({})):await r.text();
  if(!r.ok)throw {status:r.status,msg:(body&&body.error&&body.error.message)||r.statusText,body};
  return {body,headers:r.headers};
}
const ICONS={
  overview:'<path d="M3 13h8V3H3zM13 21h8V8h-8zM13 3v3h8V3zM3 21h8v-5H3z"/>',
  usage:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  keys:'<circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4M18 5l2 2M15 8l2 2"/>',
  logs:'<path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/>',
  models:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>',
  play:'<circle cx="12" cy="12" r="9"/><path d="M10 8.5l5 3.5-5 3.5z"/>',
  providers:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  mcp:'<path d="M12 2v6m0 8v6M2 12h6m8 0h6"/><circle cx="12" cy="12" r="3.2"/>',
  guard:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/>',
  copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
  plus:'<path d="M12 5v14M5 12h14"/>', search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
};
const NAV=[
  ['overview','Overview'],['usage','Usage'],['keys','Keys'],['logs','Logs'],
  ['__','Catalog'],['models','Models'],['providers','Providers'],['mcp','MCP Servers'],['guardrails','Guardrails'],
  ['__','Tools'],['playground','Playground'],
];
function renderNav(){
  let h='';for(const[id,label]of NAV){
    if(id==='__'){h+=`<div class="navlbl">${label}</div>`;continue;}
    h+=`<div class="nav" data-v="${id}"><svg viewBox="0 0 24 24">${ICONS[id==='guardrails'?'guard':id==='playground'?'play':id]||''}</svg>${label}<span class="ct" id="ct-${id}"></span></div>`;
  }
  $('#nav').innerHTML=h;
  $$('.nav').forEach(n=>n.onclick=()=>go(n.dataset.v));
}
const VIEWS={};
let CUR='overview';
function go(v){CUR=v;location.hash=v;$$('.nav').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  $('#title').firstChild.textContent=(VIEWS[v]?.title||v)+' ';
  $('#subtitle').textContent=VIEWS[v]?.sub||'';
  $('#content').innerHTML='<div class="grid g4">'+'<div class="card skeleton" style="height:96px"></div>'.repeat(4)+'</div>';
  VIEWS[v]?.render();
}
function loadingCard(h='120px'){return `<div class="card skeleton" style="height:${h}"></div>`}

function spark(vals,color='var(--acc)'){
  if(!vals.length)vals=[0,0];const w=300,h=48,mx=Math.max(...vals,1),mn=Math.min(...vals,0);
  const pts=vals.map((v,i)=>[i/(vals.length-1||1)*w,h-4-((v-mn)/((mx-mn)||1))*(h-8)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L${w} ${h} L0 ${h} Z`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".18"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#sg)"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function barlist(items,unit='usd'){
  if(!items.length)return emptyState('No data yet');
  const mx=Math.max(...items.map(i=>i.val),1);
  return '<div class="bars">'+items.map(it=>`<div class="bar"><div class="t"><span>${fmt.esc(it.label)}</span></div><div class="num dim">${unit==='usd'?fmt.usd(it.val):fmt.n(it.val)}</div><div class="track"><i style="width:${Math.max(2,it.val/mx*100)}%"></i></div></div>`).join('')+'</div>';
}
function emptyState(msg,sub=''){return `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4m0 4h.01"/></svg><div>${msg}</div>${sub?`<div class="faint" style="font-size:12px;margin-top:5px">${sub}</div>`:''}</div>`}
function capBadges(m){const c=[];if(m.supports_tools||m.tool_call)c.push('tools');if(m.supports_vision||(m.modalities&&m.modalities.input&&m.modalities.input.includes('image')))c.push('vision');if(m.reasoning)c.push('reason');if(m.supports_streaming!==false)c.push('stream');
  return '<span class="cap">'+c.map(x=>`<b class="on">${x}</b>`).join('')+'</span>';}

VIEWS.overview={title:'Overview',sub:'live',async render(){
  let o;try{o=(await api('/v1/admin/overview')).body;}catch(e){return gateOrErr(e);}
  const stats=[
    ['Total spend',fmt.usd(o.total_cost_usd),'glow','M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'],
    ['Requests',fmt.n(o.requests_total),'','M13 2 3 14h7l-1 8 10-12h-7z'],
    ['Active keys',fmt.n(o.active_keys),'','<circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4M18 5l2 2"/>'],
    ['Models',fmt.n(o.models_available),'','M12 2 2 7l10 5 10-5z'],
    ['Providers',fmt.n(o.providers_configured),'','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'],
    ['MCP servers',fmt.n(o.mcp_servers),'','<circle cx="12" cy="12" r="3"/><path d="M12 2v5M12 17v5"/>'],
  ];
  let usage=[];try{usage=(await api('/v1/usage?group_by=day')).body.buckets||[];}catch(e){}
  const top=(o.top_models||[]).map(m=>({label:m.model,val:m.cost_usd}));
  $('#content').innerHTML=`
    <div class="grid g6" style="margin-bottom:14px">${stats.map((s,i)=>`
      <div class="card stat ${s[2]}" style="animation-delay:${i*40}ms">
        <div class="k"><svg class="ic" viewBox="0 0 24 24">${s[3]}</svg>${s[0]}</div>
        <div class="v">${s[1]}</div>
      </div>`).join('')}</div>
    <div class="grid g2">
      <div class="card" style="animation-delay:.2s">
        <h3 class="sec">Spend over time</h3>
        ${usage.length?spark(usage.map(b=>b.cost_usd)):emptyState('No spend recorded yet','Make a request to see the trend')}
        <div class="row" style="justify-content:space-between;margin-top:10px;font-size:12px">
          <span class="faint mono">${usage.length+' buckets'}</span>
          <span class="num dim">${fmt.usd(usage.reduce((a,b)=>a+b.cost_usd,0))}</span>
        </div>
      </div>
      <div class="card" style="animation-delay:.26s"><h3 class="sec">Top models by spend</h3>${barlist(top)}</div>
    </div>`;
}};

let usageGroup='model';
VIEWS.usage={title:'Usage',sub:'spend analytics',async render(){
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Usage</h2><p>Spend, requests and tokens by ${usageGroup}.</p></div><div class="hspace" style="flex:1"></div>
    <div class="row" style="gap:8px">${['model','key','day'].map(g=>`<button class="btn sm ${g===usageGroup?'pri':''}" data-g="${g}">${g}</button>`).join('')}</div></div>
    <div id="ubody">${loadingCard('260px')}</div>`;
  $$('[data-g]').forEach(b=>b.onclick=()=>{usageGroup=b.dataset.g;VIEWS.usage.render();});
  let r;try{r=(await api('/v1/usage?group_by='+usageGroup)).body;}catch(e){return gateOrErr(e);}
  const b=r.buckets||[];
  $('#ubody').innerHTML=`<div class="grid g2"><div class="card">${barlist(b.map(x=>({label:x.label,val:x.cost_usd})))}</div>
    <div class="card"><h3 class="sec">Breakdown</h3><div class="tblwrap" style="box-shadow:none;border:0"><div class="tblscroll"><table class="tbl"><thead><tr><th>${usageGroup}</th><th>Cost</th><th>Reqs</th><th>Tokens</th></tr></thead><tbody>
    ${b.length?b.map(x=>`<tr><td class="mono" style="font-size:12px">${fmt.esc(x.label)}</td><td class="num">${fmt.usd(x.cost_usd)}</td><td class="num dim">${fmt.n(x.requests)}</td><td class="num dim">${fmt.n(x.tokens)}</td></tr>`).join(''):`<tr><td colspan="4">${emptyState('No usage yet')}</td></tr>`}
    </tbody></table></div></div></div></div>`;
}};

VIEWS.keys={title:'Keys',sub:'virtual keys & budgets',async render(){
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Virtual keys</h2><p>Issue scoped keys with USD budgets, model allowlists and rate limits.</p></div><div class="hspace" style="flex:1"></div><button class="btn pri" id="newkey"><svg viewBox="0 0 24 24">${ICONS.plus}</svg>Create key</button></div><div id="kbody">${loadingCard('200px')}</div>`;
  $('#newkey').onclick=keyModal;
  let r;try{r=(await api('/v1/admin/keys')).body;}catch(e){return gateOrErr(e);}
  const ks=r.keys||[];
  $('#kbody').innerHTML=ks.length?`<div class="tblwrap"><table class="tbl"><thead><tr><th>Name</th><th>Prefix</th><th>Budget / Spent</th><th>Models</th><th>Limits</th><th>Status</th><th></th></tr></thead><tbody>
    ${ks.map(k=>{const pct=k.budget_usd?Math.min(100,k.spent_usd/k.budget_usd*100):0;return `<tr>
      <td><b>${fmt.esc(k.name||k.id)}</b></td>
      <td class="mono dim" style="font-size:12px">${fmt.esc(k.prefix)}…</td>
      <td><div class="num" style="font-size:12px">${fmt.usd(k.spent_usd)} <span class="faint">/ ${k.budget_usd?fmt.usd(k.budget_usd):'∞'}</span></div>${k.budget_usd?`<div class="prog ${pct>85?'hi':''}" style="margin-top:5px"><i style="width:${pct}%"></i></div>`:''}</td>
      <td>${k.models?`<span class="chip">${k.models.length} model${k.models.length>1?'s':''}</span>`:'<span class="faint">all</span>'}</td>
      <td class="mono dim" style="font-size:12px">${k.rpm?k.rpm+' rpm':''}${k.rpm&&k.tpm?' · ':''}${k.tpm?fmt.n(k.tpm)+' tpm':''}${!k.rpm&&!k.tpm?'<span class="faint">none</span>':''}</td>
      <td>${k.revoked?'<span class="chip bad">revoked</span>':'<span class="chip ok">active</span>'}</td>
      <td>${k.revoked?'':`<button class="btn sm danger" onclick="revokeKey('${k.id}')">Revoke</button>`}</td></tr>`;}).join('')}
    </tbody></table></div>`:emptyState('No keys yet','Create your first virtual key');
}};
function keyModal(){
  openModal(`<h3>Create virtual key</h3><div class="mdsc">The secret is shown once — store it immediately.</div>
    <div class="field"><label>Name</label><input id="k-name" placeholder="e.g. mobile-app" autofocus></div>
    <div class="row" style="gap:12px"><div class="field" style="flex:1"><label>Budget (USD)</label><input id="k-budget" type="number" step="0.01" placeholder="unlimited"></div>
    <div class="field" style="flex:1"><label>RPM limit</label><input id="k-rpm" type="number" placeholder="none"></div></div>
    <div class="field"><label>Model allowlist (comma-sep, blank = all)</label><input id="k-models" placeholder="openai/gpt-4o, anthropic/claude-3.5-haiku"></div>
    <div class="acts"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn pri" id="k-create">Create key</button></div>`);
  $('#k-create').onclick=async()=>{
    const body={name:$('#k-name').value||'key',budget_usd:$('#k-budget').value?+$('#k-budget').value:null,
      rpm:$('#k-rpm').value?+$('#k-rpm').value:null,models:$('#k-models').value.trim()?$('#k-models').value.split(',').map(s=>s.trim()).filter(Boolean):null};
    try{const r=(await api('/v1/admin/keys',{method:'POST',body:JSON.stringify(body)})).body;
      openModal(`<h3>Key created</h3><div class="mdsc">Copy the secret now — it cannot be recovered.</div>
        <div class="secretbox"><span>${fmt.esc(r.secret)}</span><button class="btn sm" onclick="navigator.clipboard.writeText('${r.secret}');toast('Copied')"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8">${ICONS.copy}</svg></button></div>
        <div class="acts"><button class="btn pri" onclick="closeModal();go('keys')">Done</button></div>`);
      toast('Key created');
    }catch(e){toast('Create failed: '+e.msg,'err');}
  };
}
async function revokeKey(id){if(!confirm('Revoke this key? Requests with it will immediately fail.'))return;
  try{await api('/v1/admin/keys/'+id+'/revoke',{method:'POST'});toast('Key revoked','warn');go('keys');}catch(e){toast('Revoke failed: '+e.msg,'err');}}

let logTimer=null;
VIEWS.logs={title:'Logs',sub:'request stream',async render(){
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Request logs</h2><p>Most recent requests across all keys.</p></div><div class="hspace" style="flex:1"></div><span class="chip ok"><span class="dot ok"></span>live</span></div><div id="lbody">${loadingCard('300px')}</div>`;
  const draw=async()=>{let r;try{r=(await api('/v1/admin/logs?limit=120')).body;}catch(e){clearInterval(logTimer);return gateOrErr(e);}
    const L=r.logs||[];$('#lbody').innerHTML=L.length?`<div class="tblwrap"><div class="tblscroll"><table class="tbl"><thead><tr><th>When</th><th>Model</th><th>Provider</th><th>Status</th><th>Cost</th><th>Latency</th><th>Cache</th></tr></thead><tbody>
      ${L.map(x=>`<tr><td class="mono faint" style="font-size:12px">${fmt.ago(x.ts_ms)}</td><td class="mono" style="font-size:12px">${fmt.esc(x.model)}</td><td class="dim">${fmt.esc(x.provider||'—')}</td>
      <td><span class="chip ${x.status<300?'ok':x.status<500?'warn':'bad'}">${x.status}</span></td><td class="num">${fmt.usd(x.cost_usd)}</td><td class="num dim">${fmt.ms(x.latency_ms)}</td>
      <td>${x.cache_status&&x.cache_status.toUpperCase().includes('HIT')?'<span class="chip v">HIT</span>':'<span class="faint mono" style="font-size:12px">'+fmt.esc(x.cache_status||'—')+'</span>'}</td></tr>`).join('')}
      </tbody></table></div></div>`:emptyState('No requests yet','Send a request through the gateway');
  };await draw();clearInterval(logTimer);logTimer=setInterval(()=>{if(CUR==='logs')draw();else clearInterval(logTimer);},4000);
}};

let allModels=[],modelFilter='';
VIEWS.models={title:'Models',sub:'catalog',async render(){
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Model catalog</h2><p id="mcount">Loading…</p></div><div class="hspace" style="flex:1"></div>
    <div class="searchbox"><svg viewBox="0 0 24 24">${ICONS.search}</svg><input id="msearch" placeholder="Search models or providers…" value="${fmt.esc(modelFilter)}"></div></div><div id="mbody">${loadingCard('300px')}</div>`;
  $('#msearch').oninput=e=>{modelFilter=e.target.value;drawModels();};
  try{allModels=(await api('/v1/models')).body.data||[];}catch(e){return gateOrErr(e);}
  drawModels();
}};
function drawModels(){
  const q=modelFilter.toLowerCase();
  const ms=allModels.filter(m=>!q||(m.id||'').toLowerCase().includes(q)||(m.owned_by||m.provider||'').toLowerCase().includes(q));
  if($('#mcount'))$('#mcount').textContent=`${fmt.n(allModels.length)} models${q?` · ${ms.length} match`:''} across providers`;
  $('#mbody').innerHTML=ms.length?`<div class="tblwrap"><div class="tblscroll"><table class="tbl"><thead><tr><th>Model</th><th>Provider</th><th>Input /1M</th><th>Output /1M</th><th>Context</th><th>Capabilities</th></tr></thead><tbody>
    ${ms.slice(0,600).map(m=>{const p=m.pricing||{};const inp=p.input_per_mtok_micros!=null?p.input_per_mtok_micros/1e6:p.input;const out=p.output_per_mtok_micros!=null?p.output_per_mtok_micros/1e6:p.output;
      return `<tr><td class="mono" style="font-size:12px">${fmt.esc(m.id)}</td><td><span class="chip">${fmt.esc(m.owned_by||m.provider||'—')}</span></td>
      <td class="num dim">${inp!=null?fmt.usd(inp):'—'}</td><td class="num dim">${out!=null?fmt.usd(out):'—'}</td>
      <td class="num faint">${m.context_window?fmt.n(m.context_window):'—'}</td><td>${capBadges(m)}</td></tr>`;}).join('')}
    </tbody></table></div></div>${ms.length>600?`<div class="faint" style="text-align:center;padding:12px;font-size:12px">Showing first 600 of ${fmt.n(ms.length)} — refine your search</div>`:''}`:emptyState('No models match','Try a different search');
}

VIEWS.providers={title:'Providers',sub:'',async render(){
  let r;try{r=(await api('/v1/admin/providers')).body;}catch(e){return gateOrErr(e);}
  const ps=r.providers||[];
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Providers</h2><p>${ps.filter(p=>p.configured).length} of ${ps.length} configured with credentials.</p></div></div>
    <div class="grid g3">${ps.map((p,i)=>`<div class="card" style="animation-delay:${i*30}ms"><div class="row" style="justify-content:space-between"><b style="font-size:15px">${fmt.esc(p.id)}</b>${p.configured?'<span class="chip ok"><span class="dot ok"></span>active</span>':'<span class="chip">not set</span>'}</div>
      <div class="num" style="margin-top:14px;font-size:22px;font-weight:600">${fmt.n(p.models_count)}</div><div class="faint" style="font-size:11.5px">models available</div></div>`).join('')||emptyState('No providers')}</div>`;
}};

VIEWS.mcp={title:'MCP Servers',sub:'tool federation',async render(){
  let r;try{r=(await api('/v1/admin/mcp')).body;}catch(e){return gateOrErr(e);}
  const ss=r.servers||[];
  $('#content').innerHTML=`<div class="pagehd"><div><h2>MCP servers</h2><p>Federated Model Context Protocol servers and their tools.</p></div></div>
    ${ss.length?ss.map(s=>`<div class="card" style="margin-bottom:14px"><div class="row" style="justify-content:space-between;margin-bottom:12px"><b style="font-size:15px">${fmt.esc(s.name)}</b><span class="chip ${s.healthy?'ok':'bad'}"><span class="dot ${s.healthy?'ok':'bad'}"></span>${s.healthy?'healthy':'down'}</span></div>
      <div class="row" style="flex-wrap:wrap;gap:7px">${(s.tools||[]).map(t=>`<span class="chip" title="${fmt.esc(t.description)}">${fmt.esc(t.name)}</span>`).join('')||'<span class="faint">no tools</span>'}</div></div>`).join(''):
    emptyState('No MCP servers configured','Register servers via OXIMY_MCP_SERVERS or the config file')}`;
}};

VIEWS.guardrails={title:'Guardrails',sub:'policy',async render(){
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Guardrails</h2><p>Content policies enforced on every request and response.</p></div></div>
    <div class="grid g3">${[
      ['Secrets scanner','Blocks API keys, tokens & credentials in prompts','ok','Enforce'],
      ['PII redaction','Masks emails, phones, cards & SSNs','ok','Enforce'],
      ['Prompt-injection','Heuristic jailbreak detection','warn','Observe'],
      ['Keyword banlist','Configurable blocked terms','','Off'],
      ['Output schema','Validates JSON responses against a schema','','Off'],
      ['Webhook','External guardrail (Lakera-shaped)','','Seam'],
    ].map((g,i)=>`<div class="card" style="animation-delay:${i*30}ms"><div class="row" style="justify-content:space-between"><b>${g[0]}</b><span class="chip ${g[2]}">${g[3]}</span></div><p class="dim" style="font-size:12.5px;margin-top:9px">${g[1]}</p></div>`).join('')}</div>
    <p class="faint" style="font-size:12px;margin-top:16px">Modes: <b class="mono">Enforce</b> blocks · <b class="mono">Observe</b> logs only · <b class="mono">Dry-run</b> simulates. Configure per-key in <span class="mono">oximy-gateway.json</span>.</p>`;
}};

VIEWS.playground={title:'Playground',sub:'',async render(){
  let models=[];try{models=(await api('/v1/models')).body.data||[];}catch(e){return gateOrErr(e);}
  const pop=['openai/gpt-4o-mini','openai/gpt-4o','anthropic/claude-3.5-haiku','deepseek/deepseek-chat'].filter(id=>models.some(m=>m.id===id));
  const opts=[...new Set([...pop,...models.map(m=>m.id)])].slice(0,400).map(id=>`<option>${fmt.esc(id)}</option>`).join('');
  $('#content').innerHTML=`<div class="pagehd"><div><h2>Playground</h2><p>Send a chat completion through the gateway.</p></div></div>
    <div class="grid g2"><div class="card">
      <div class="field"><label>Model</label><select id="pg-model">${opts}</select></div>
      <div class="field"><label>System (optional)</label><textarea id="pg-sys" style="min-height:54px" placeholder="You are a helpful assistant."></textarea></div>
      <div class="field"><label>Message</label><textarea id="pg-msg" placeholder="Ask anything…">Say hello in five words.</textarea></div>
      <button class="btn pri" id="pg-send" style="width:100%"><svg viewBox="0 0 24 24">${ICONS.play}</svg>Send request</button>
    </div><div class="card"><h3 class="sec">Response</h3><div id="pg-out" class="dim" style="font-size:13.5px;white-space:pre-wrap;line-height:1.6">—</div><div id="pg-meta" class="row" style="margin-top:14px;gap:8px;flex-wrap:wrap"></div></div></div>`;
  $('#pg-send').onclick=async()=>{
    const out=$('#pg-out'),meta=$('#pg-meta');out.innerHTML='<span class="skeleton">generating…</span>';meta.innerHTML='';
    const msgs=[];if($('#pg-sys').value.trim())msgs.push({role:'system',content:$('#pg-sys').value});msgs.push({role:'user',content:$('#pg-msg').value});
    const t0=performance.now();
    try{const r=await api('/v1/chat/completions',{method:'POST',body:JSON.stringify({model:$('#pg-model').value,messages:msgs})});
      const d=r.body;out.textContent=d.choices?.[0]?.message?.content||'(empty)';
      const cost=d.usage?.cost,ov=r.headers.get('x-overhead-duration-ms'),served=r.headers.get('x-served-by');
      meta.innerHTML=`<span class="chip ok">${fmt.usd(cost)}</span><span class="chip">${d.usage?.total_tokens||0} tok</span><span class="chip">${Math.round(performance.now()-t0)}ms total</span>${ov?`<span class="chip">${ov}ms overhead</span>`:''}${served?`<span class="chip v">${fmt.esc(served)}</span>`:''}`;
    }catch(e){out.innerHTML=`<span class="chip bad">${e.status||''} ${fmt.esc(e.msg)}</span>`;}
  };
}};

function gateOrErr(e){if(e.status===401){openKeyGate();$('#content').innerHTML=emptyState('Enter your API key to continue','Use the admin key printed on first boot');}else{$('#content').innerHTML=emptyState('Error '+(e.status||''),fmt.esc(e.msg));toast(e.msg||'Request failed','err');}}
function openModal(html){$('#modal').innerHTML=html;$('#scrim').classList.add('on');}
function closeModal(){$('#scrim').classList.remove('on');}
$('#scrim').onclick=e=>{if(e.target===$('#scrim'))closeModal();};
function openKeyGate(){
  openModal(`<div class="gate" style="text-align:center"><div class="logo"><i>O</i></div></div><h3 style="text-align:center">Oximy Gateway</h3><div class="mdsc" style="text-align:center">Paste your API key to access the dashboard.</div>
    <div class="field"><input id="gk" type="password" placeholder="ogw_…" value="${fmt.esc(KEY)}" autofocus></div>
    <div class="acts" style="justify-content:center"><button class="btn pri" id="gk-save" style="width:100%">Connect</button></div>`);
  $('#gk-save').onclick=()=>{KEY=$('#gk').value.trim();localStorage.setItem('oxgw_key',KEY);closeModal();updateKeyChip();go(CUR);refreshCounts();};
  $('#gk').onkeydown=e=>{if(e.key==='Enter')$('#gk-save').click();};
}
$('#keychip').onclick=openKeyGate;
function updateKeyChip(){const has=!!KEY;$('#keydot').className='dot '+(has?'ok':'bad');$('#keylabel').textContent=has?KEY.slice(0,10)+'…':'no key';}

async function health(){try{const r=await fetch(API+'/health');const d=await r.json();
  $('#hdot').className='dot ok';$('#hlabel').textContent='healthy';$('#footdot').className='dot ok';$('#footstat').lastChild.textContent='operational';
  $('#ver').textContent='v'+(d.version||'—');
}catch(e){$('#hdot').className='dot bad';$('#hlabel').textContent='down';$('#footdot').className='dot bad';}}
async function refreshCounts(){
  if(!KEY)return;
  try{const m=(await api('/v1/models')).body.data||[];$('#ct-models').textContent=m.length>999?(m.length/1000).toFixed(1)+'k':m.length;}catch(e){}
  try{const o=(await api('/v1/admin/overview')).body;$('#ct-keys').textContent=o.active_keys||'';$('#ct-providers').textContent=o.providers_configured||'';$('#ct-mcp').textContent=o.mcp_servers||'';$('#reqnum').textContent=fmt.n(o.requests_total);}catch(e){}
}

renderNav();updateKeyChip();health();setInterval(health,15000);
go(location.hash.slice(1)&&VIEWS[location.hash.slice(1)]?location.hash.slice(1):'overview');
if(!KEY)openKeyGate();else refreshCounts();
setInterval(refreshCounts,20000);
window.addEventListener('hashchange',()=>{const v=location.hash.slice(1);if(v&&VIEWS[v]&&v!==CUR)go(v);});
window.revokeKey=revokeKey;window.closeModal=closeModal;window.go=go;
</script>
</body>
</html>
